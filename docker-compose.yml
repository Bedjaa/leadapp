version: '3.9'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
  api:
    build: ./services/api
    command: pnpm start:prod
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - '4000:4000'
  web:
    build: ./apps/web
    command: pnpm start
    env_file: .env
    depends_on:
      - api
    ports:
      - '3000:3000'
